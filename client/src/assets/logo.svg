<svg width="420" height="70" viewBox="0 0 420 70" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Double S Circle Logo -->
  <g transform="translate(2, 3) scale(0.31)">
    
    <!-- Back S (black) -->
    <text x="48" y="148"
      font-family="Arial Black, Arial, sans-serif"
      font-size="120" font-weight="900" font-style="italic"
      fill="black">S</text>
    <!-- Front S (white with black stroke) -->
    <text x="72" y="138"
      font-family="Arial Black, Arial, sans-serif"
      font-size="120" font-weight="900" font-style="italic"
      fill="white" stroke="black" stroke-width="6" paint-order="stroke">S</text>
    <text x="72" y="138"
      font-family="Arial Black, Arial, sans-serif"
      font-size="120" font-weight="900" font-style="italic"
      fill="white">S</text>
  </g>

  <!-- EasyAi text -->
  <text x="53" y="50"
    font-family="Arial, Helvetica, sans-serif"
    font-size="38" font-weight="700"
    fill="black" letter-spacing="-0.5">EasyAi</text>

</svg>
