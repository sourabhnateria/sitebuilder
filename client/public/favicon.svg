<svg width="100" height="100" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">



  <!-- Large background S (slightly offset left, black) -->
  <text
    x="38"
    y="138"
    font-family="Arial Black, Arial, sans-serif"
    font-size="120"
    font-weight="900"
    font-style="italic"
    fill="black"
    opacity="1"
  >S</text>

  <!-- Foreground S (slightly offset right, white with black outline effect) -->
  <text
    x="62"
    y="138"
    font-family="Arial Black, Arial, sans-serif"
    font-size="120"
    font-weight="900"
    font-style="italic"
    fill="white"
    stroke="black"
    stroke-width="6"
    paint-order="stroke"
  >S</text>

  <!-- Re-draw front S fill clean -->
  <text
    x="62"
    y="138"
    font-family="Arial Black, Arial, sans-serif"
    font-size="120"
    font-weight="900"
    font-style="italic"
    fill="white"
  >S</text>

</svg>
